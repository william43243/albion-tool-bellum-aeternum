server {
    listen 80;
    server_name albion-tool-bellum-aeternum.com;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Landing page
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Expo web app
    location /app/ {
        alias /usr/share/nginx/html/app/;
        try_files $uri $uri/ /app/index.html;
    }

    # APK downloads — served from the /data/apks/ bind mount so publishing a new
    # version does not require rebuilding the Docker image. See publish.js CLI.
    location /downloads/ {
        alias /data/apks/;
        autoindex off;
        add_header Cache-Control "public, max-age=300";
    }

    # Assets (shared)
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Admin dashboard
    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Analytics API — proxy to Node.js backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
