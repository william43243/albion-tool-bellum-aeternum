<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Gold gradient for the letter -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d878"/>
      <stop offset="35%" stop-color="#c8a84e"/>
      <stop offset="70%" stop-color="#a08030"/>
      <stop offset="100%" stop-color="#806018"/>
    </linearGradient>
    <!-- Highlight edge gradient -->
    <linearGradient id="goldHighlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0c872"/>
      <stop offset="50%" stop-color="#c8a84e"/>
      <stop offset="100%" stop-color="#9a7828"/>
    </linearGradient>
    <!-- Background radial glow -->
    <radialGradient id="bgGlow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="60%" stop-color="#111820"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <!-- Inner shadow for the letter -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
    <!-- Drop shadow -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <!-- Gold glow -->
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="glow"/>
      <feColorMatrix in="glow" type="matrix" values="1 0 0 0 0  0.8 0.6 0 0 0  0.3 0.2 0 0 0  0 0 0 0.4 0" result="coloredGlow"/>
      <feMerge>
        <feMergeNode in="coloredGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Beveled edge effect -->
    <linearGradient id="bevelTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e8a0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c8a84e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bgGlow)"/>

  <!-- Subtle border -->
  <rect x="4" y="4" width="1016" height="1016" rx="198" ry="198" fill="none" stroke="#c8a84e" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Decorative corner accents -->
  <!-- Top left -->
  <path d="M200,80 L280,80" stroke="#c8a84e" stroke-opacity="0.3" stroke-width="2" fill="none"/>
  <path d="M80,200 L80,280" stroke="#c8a84e" stroke-opacity="0.3" stroke-width="2" fill="none"/>
  <path d="M80,200 Q80,80 200,80" stroke="#c8a84e" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>

  <!-- Top right -->
  <path d="M744,80 L824,80" stroke="#c8a84e" stroke-opacity="0.3" stroke-width="2" fill="none"/>
  <path d="M944,200 L944,280" stroke="#c8a84e" stroke-opacity="0.3" stroke-width="2" fill="none"/>
  <path d="M824,80 Q944,80 944,200" stroke="#c8a84e" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>

  <!-- Bottom left -->
  <path d="M200,944 L280,944" stroke="#c8a84e" stroke-opacity="0.3" stroke-width="2" fill="none"/>
  <path d="M80,744 L80,824" stroke="#c8a84e" stroke-opacity="0.3" stroke-width="2" fill="none"/>
  <path d="M80,824 Q80,944 200,944" stroke="#c8a84e" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>

  <!-- Bottom right -->
  <path d="M744,944 L824,944" stroke="#c8a84e" stroke-opacity="0.3" stroke-width="2" fill="none"/>
  <path d="M944,744 L944,824" stroke="#c8a84e" stroke-opacity="0.3" stroke-width="2" fill="none"/>
  <path d="M824,944 Q944,944 944,824" stroke="#c8a84e" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>

  <!-- Small diamond decorations -->
  <g fill="#c8a84e" fill-opacity="0.25">
    <rect x="504" y="120" width="16" height="16" rx="2" transform="rotate(45 512 128)"/>
    <rect x="504" y="876" width="16" height="16" rx="2" transform="rotate(45 512 884)"/>
  </g>

  <!-- Main "A" letter with medieval serif style -->
  <g filter="url(#goldGlow)">
    <!-- Main A shape - bold medieval style with serifs -->
    <path d="
      M 512 180
      L 310 780
      L 270 780
      Q 258 780 258 768
      L 258 760
      Q 258 752 266 748
      L 460 240
      Q 480 195 512 180
      Q 544 195 564 240
      L 758 748
      Q 766 752 766 760
      L 766 768
      Q 766 780 754 780
      L 714 780
      Z

      M 390 620
      L 634 620
      L 612 560
      L 412 560
      Z
    " fill="url(#goldGrad)" fill-rule="evenodd" filter="url(#dropShadow)"/>

    <!-- Left serif at base -->
    <path d="M 270 770 Q 260 770 250 780 L 230 800 Q 222 810 232 815 L 350 815 Q 360 815 358 805 L 340 780 Q 335 770 320 770 Z" fill="url(#goldGrad)"/>

    <!-- Right serif at base -->
    <path d="M 704 770 Q 689 770 684 780 L 666 805 Q 664 815 674 815 L 792 815 Q 802 810 794 800 L 774 780 Q 764 770 754 770 Z" fill="url(#goldGrad)"/>

    <!-- Top serif / crown accent -->
    <path d="M 490 195 Q 500 175 512 168 Q 524 175 534 195 L 540 210 Q 530 200 512 200 Q 494 200 484 210 Z" fill="#f0d878"/>

    <!-- Highlight line on left edge -->
    <path d="M 475 230 L 290 755" stroke="#f5e8a0" stroke-opacity="0.3" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Highlight line on right edge -->
    <path d="M 549 230 L 734 755" stroke="#806018" stroke-opacity="0.3" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Horizontal bar decoration - small dots -->
  <g fill="#c8a84e" fill-opacity="0.4">
    <circle cx="370" cy="590" r="4"/>
    <circle cx="654" cy="590" r="4"/>
  </g>

  <!-- Subtle "MARKET" text below -->
  <text x="512" y="890" text-anchor="middle" font-family="serif" font-weight="700" font-size="52" letter-spacing="18" fill="#c8a84e" fill-opacity="0.5">MARKET</text>

  <!-- Decorative line under text -->
  <line x1="350" y1="910" x2="674" y2="910" stroke="#c8a84e" stroke-opacity="0.2" stroke-width="1.5"/>
</svg>
