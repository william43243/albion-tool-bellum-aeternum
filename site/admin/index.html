<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albion Market — Command Center</title>
<link rel="icon" href="/assets/favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d1117;
  --bg-deep: #080b10;
  --surface: #161b22;
  --surface-raised: #1c2129;
  --surface-light: #21262d;
  --gold: #c8a84e;
  --gold-dark: #a08030;
  --gold-light: #e0c872;
  --gold-glow: rgba(200, 168, 78, 0.12);
  --gold-glow-strong: rgba(200, 168, 78, 0.25);
  --text: #e6edf3;
  --text-sec: #8b949e;
  --text-muted: #6e7681;
  --border: #30363d;
  --border-gold: rgba(200, 168, 78, 0.2);
  --green: #4CAF50;
  --green-glow: rgba(76, 175, 80, 0.15);
  --red: #F44336;
  --blue: #58a6ff;
  --blue-glow: rgba(88, 166, 255, 0.12);
  --purple: #bc8cff;
  --purple-glow: rgba(188, 140, 255, 0.12);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(200, 168, 78, 0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200, 168, 78, 0.015) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.03) 2px,
    rgba(0, 0, 0, 0.03) 4px
  );
  pointer-events: none;
  z-index: 9998;
}

.shell {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px 28px 80px;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 180px;
  height: 1px;
  background: linear-gradient(90deg, var(--gold), transparent);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-left .sigil {
  width: 40px;
  height: 40px;
  border: 1px solid var(--gold-dark);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  background: linear-gradient(135deg, var(--surface), var(--surface-raised));
  box-shadow: 0 0 20px var(--gold-glow);
  flex-shrink: 0;
}

.header h1 {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.header h1 span {
  font-weight: 400;
  color: var(--text-sec);
  font-size: 13px;
  letter-spacing: 1px;
  display: block;
  margin-top: 2px;
}

.auth-bar {
  display: flex;
  align-items: center;
  gap: 10px;
}

.auth-bar label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.auth-bar input {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  border-radius: 4px;
  width: 200px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.auth-bar input:focus {
  outline: none;
  border-color: var(--gold-dark);
  box-shadow: 0 0 0 3px var(--gold-glow);
}

.auth-bar input::placeholder { color: var(--text-muted); }

.auth-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--bg);
  background: var(--gold);
  border: none;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: background 0.2s, box-shadow 0.2s;
}

.auth-btn:hover {
  background: var(--gold-light);
  box-shadow: 0 0 12px var(--gold-glow);
}

.lang-switcher {
  display: flex;
  gap: 2px;
  margin-right: 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.lang-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  background: transparent;
  border: none;
  padding: 6px 10px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}

.lang-btn:hover { color: var(--text-sec); background: var(--surface-light); }

.lang-btn.active {
  color: var(--gold);
  background: var(--surface-light);
}

.auth-bar .status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: background 0.3s, box-shadow 0.3s;
}

.auth-bar .status-dot.live {
  background: var(--green);
  box-shadow: 0 0 8px var(--green-glow);
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.controls {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 28px;
}

.controls button {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid transparent;
  padding: 7px 18px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.controls button:hover {
  color: var(--text-sec);
  background: var(--surface);
}

.controls button.active {
  color: var(--gold);
  background: var(--surface);
  border-color: var(--border-gold);
  box-shadow: 0 0 12px var(--gold-glow);
}

.controls .separator {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 8px;
}

.controls .refresh-btn {
  margin-left: auto;
  color: var(--text-muted);
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.controls .refresh-btn svg {
  width: 14px;
  height: 14px;
  transition: transform 0.4s;
}

.controls .refresh-btn:hover svg { transform: rotate(180deg); }
.controls .refresh-btn:hover { color: var(--gold); }

.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 22px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.card:hover {
  border-color: var(--border-gold);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3), 0 0 20px var(--gold-glow);
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
}

.card:nth-child(1)::before { background: linear-gradient(90deg, var(--gold), transparent); }
.card:nth-child(2)::before { background: linear-gradient(90deg, var(--blue), transparent); }
.card:nth-child(3)::before { background: linear-gradient(90deg, var(--green), transparent); }
.card:nth-child(4)::before { background: linear-gradient(90deg, var(--purple), transparent); }

.card .card-icon {
  position: absolute;
  top: 16px;
  right: 18px;
  font-size: 20px;
  opacity: 0.3;
}

.card .card-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.card .card-value {
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
  margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
}

.card:nth-child(1) .card-value { color: var(--gold-light); }
.card:nth-child(2) .card-value { color: var(--blue); }
.card:nth-child(3) .card-value { color: var(--green); }
.card:nth-child(4) .card-value { color: var(--purple); }

.card .card-sub {
  font-size: 11px;
  color: var(--text-muted);
}

.card .card-sub strong {
  color: var(--text-sec);
  font-weight: 600;
}

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 28px;
}

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.panel-body { padding: 20px; }
.panel-body.flush { padding: 0; }

.chart-wrap {
  position: relative;
  height: 280px;
  padding: 16px 20px;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.data-table thead th {
  text-align: left;
  padding: 10px 20px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  font-weight: 500;
  border-bottom: 1px solid var(--border);
  background: var(--surface-raised);
}

.data-table thead th:last-child { text-align: right; }

.data-table tbody td {
  padding: 10px 20px;
  border-bottom: 1px solid rgba(48, 54, 61, 0.4);
  font-variant-numeric: tabular-nums;
}

.data-table tbody td:last-child {
  text-align: right;
  font-weight: 600;
  color: var(--gold-light);
}

.data-table tbody tr { transition: background 0.15s; }
.data-table tbody tr:hover { background: var(--surface-raised); }
.data-table tbody tr:last-child td { border-bottom: none; }

.data-table .bar-cell {
  display: flex;
  align-items: center;
  gap: 12px;
}

.data-table .mini-bar {
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--gold-dark), var(--gold));
  min-width: 4px;
  transition: width 0.5s ease;
}

.badge {
  display: inline-block;
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}

.badge-tool { background: var(--gold-glow); color: var(--gold); border: 1px solid var(--border-gold); }
.badge-download { background: var(--green-glow); color: var(--green); border: 1px solid rgba(76, 175, 80, 0.2); }
.badge-engagement { background: var(--blue-glow); color: var(--blue); border: 1px solid rgba(88, 166, 255, 0.2); }
.badge-other { background: rgba(139, 148, 158, 0.1); color: var(--text-sec); border: 1px solid var(--border); }

.loading-state {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  color: var(--text-muted);
  font-size: 12px;
  letter-spacing: 1px;
}

.loading-state .spinner {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 12px;
}

.footer {
  text-align: center;
  padding: 32px 0;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

.footer a {
  color: var(--gold-dark);
  text-decoration: none;
}

.footer a:hover { color: var(--gold); }

@media (max-width: 1024px) {
  .cards { grid-template-columns: repeat(2, 1fr); }
  .grid-2 { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  .shell { padding: 16px 14px 60px; }
  .cards { grid-template-columns: 1fr; }
  .header { flex-direction: column; align-items: flex-start; }
  .card .card-value { font-size: 26px; }
  .controls { flex-wrap: wrap; }
  .auth-bar input { width: 150px; }
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.card { animation: fade-up 0.4s ease backwards; }
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.1s; }
.card:nth-child(3) { animation-delay: 0.15s; }
.card:nth-child(4) { animation-delay: 0.2s; }
.panel { animation: fade-up 0.4s ease 0.25s backwards; }
</style>
</head>
<body>

<div class="shell">

  <header class="header">
    <div class="header-left">
      <div class="sigil">&#9876;</div>
      <h1><span class="h1-main" data-i18n="title">Command Center</span><span data-i18n="subtitle">Albion Market Analytics</span></h1>
    </div>
    <div class="auth-bar">
      <div class="lang-switcher" id="lang-switcher">
        <button data-lang="fr" class="lang-btn active">FR</button>
        <button data-lang="en" class="lang-btn">EN</button>
        <button data-lang="es" class="lang-btn">ES</button>
      </div>
      <label for="token-input">Token</label>
      <input type="password" id="token-input" placeholder="admin token" autocomplete="off">
      <button class="auth-btn" id="auth-btn" data-i18n="login">Connexion</button>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </header>

  <div class="controls">
    <button data-days="7">7d</button>
    <button data-days="30" class="active">30d</button>
    <button data-days="90">90d</button>
    <button data-days="365">1y</button>
    <div class="separator"></div>
    <button class="refresh-btn" id="refresh-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      <span data-i18n="refresh">Refresh</span>
    </button>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-icon">&#128065;</div>
      <div class="card-label" data-i18n="page_views">Page Views</div>
      <div class="card-value" id="stat-views">&mdash;</div>
      <div class="card-sub"><span data-i18n="all_time">All time</span>: <strong id="stat-views-all">&mdash;</strong></div>
    </div>
    <div class="card">
      <div class="card-icon">&#128100;</div>
      <div class="card-label" data-i18n="unique_visitors">Unique Visitors</div>
      <div class="card-value" id="stat-visitors">&mdash;</div>
      <div class="card-sub"><span data-i18n="period">Period</span>: <strong id="stat-period-label">30 days</strong></div>
    </div>
    <div class="card">
      <div class="card-icon">&#11015;</div>
      <div class="card-label" data-i18n="apk_downloads">APK Downloads</div>
      <div class="card-value" id="stat-downloads">&mdash;</div>
      <div class="card-sub"><span data-i18n="all_time">All time</span>: <strong id="stat-downloads-all">&mdash;</strong></div>
    </div>
    <div class="card">
      <div class="card-icon">&#9889;</div>
      <div class="card-label" data-i18n="total_events">Total Events</div>
      <div class="card-value" id="stat-events">&mdash;</div>
      <div class="card-sub" data-i18n="interactions_tracked">Interactions tracked</div>
    </div>
  </div>

  <div class="grid-2">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title" data-i18n="daily_traffic">Daily Traffic</span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-pageviews"></canvas>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title" data-i18n="tool_usage">Tool Usage &mdash; All Time</span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-tools"></canvas>
      </div>
    </div>
  </div>

  <div class="grid-2">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title" data-i18n="pages">Pages</span>
      </div>
      <div class="panel-body flush" id="table-pages">
        <div class="loading-state"><div class="spinner"></div><span data-i18n="loading">Loading...</span></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title" data-i18n="events">Events</span>
      </div>
      <div class="panel-body flush" id="table-events">
        <div class="loading-state"><div class="spinner"></div><span data-i18n="loading">Loading...</span></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <a href="/" data-i18n="back">&larr; Back to Albion Market</a> &nbsp;&middot;&nbsp; Analytics Engine v1.0
  </footer>

</div>

<script>

  var currentDays = 30;
  var pvChart = null;
  var toolChart = null;
  var currentLang = localStorage.getItem('admin_lang') || 'fr';

  var i18n = {
    fr: {

      chart_pageviews: 'Paginas Vistas',
      chart_visitors: 'Visitantes Unicos',
      chart_total_uses: 'Usos totales',
      days_suffix: 'dias'
    }
  };

  function t(key) { return (i18n[currentLang] || i18n.en)[key] || key; }

  function applyLang() {
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      el.textContent = t(el.getAttribute('data-i18n'));
    });
    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });
  }

  function $(s) { return document.querySelector(s); }
  function $$(s) { return document.querySelectorAll(s); }
  function fmt(n) { return n == null ? '\u2014' : Number(n).toLocaleString(); }

  // Safe text setter — avoids innerHTML for untrusted data
  function setText(id, text) {
    var el = typeof id === 'string' ? $(id) : id;
    if (el) el.textContent = text;
  }

  var tokenInput = $('#token-input');
  var statusDot = $('#status-dot');

  var authBtn = $('#auth-btn');

  tokenInput.value = localStorage.getItem('admin_token') || '';

  function submitToken() {
    localStorage.setItem('admin_token', tokenInput.value);
    loadAll();
  }

  authBtn.addEventListener('click', submitToken);

  tokenInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitToken();
  });

  // Language switcher
  $$('.lang-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentLang = btn.dataset.lang;
      localStorage.setItem('admin_lang', currentLang);
      applyLang();
      loadAll();
    });
  });

  applyLang();

  function getToken() { return tokenInput.value.trim(); }

  function apiUrl(path) {
    var params = new URLSearchParams({ days: currentDays });
    var token = getToken();
    if (token) params.set('token', token);
    return path + '?' + params.toString();
  }

  function apiFetch(path) {
    return fetch(apiUrl(path)).then(function(res) {
      if (!res.ok) throw new Error(res.status);
      return res.json();
    });
  }

  // Period buttons
  $$('.controls button[data-days]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      $$('.controls button[data-days]').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentDays = parseInt(btn.dataset.days);
      loadAll();
    });
  });

  $('#refresh-btn').addEventListener('click', loadAll);

  // Chart.js defaults
  Chart.defaults.color = '#8b949e';
  Chart.defaults.borderColor = 'rgba(48,54,61,0.5)';
  Chart.defaults.font.family = "'JetBrains Mono', monospace";
  Chart.defaults.font.size = 11;

  function loadOverview() {
    apiFetch('/api/stats/overview').then(function(data) {
      setText('#stat-views', fmt(data.page_views));
      setText('#stat-visitors', fmt(data.unique_visitors));
      setText('#stat-downloads', fmt(data.downloads));
      setText('#stat-events', fmt(data.total_events));
      setText('#stat-views-all', fmt(data.all_time.page_views));
      setText('#stat-downloads-all', fmt(data.all_time.downloads));
      setText('#stat-period-label', data.period_days + ' ' + t('days_suffix'));
      statusDot.classList.add('live');
    }).catch(function() {
      statusDot.classList.remove('live');
    });
  }

  function loadPageviewsChart() {
    apiFetch('/api/stats/pageviews').then(function(data) {
      var labels = data.daily.map(function(d) { return d.date.slice(5); });
      var views = data.daily.map(function(d) { return d.views; });
      var uniques = data.daily.map(function(d) { return d.unique_visitors; });

      if (pvChart) pvChart.destroy();

      var ctx = $('#chart-pageviews').getContext('2d');

      var gradientGold = ctx.createLinearGradient(0, 0, 0, 260);
      gradientGold.addColorStop(0, 'rgba(200, 168, 78, 0.3)');
      gradientGold.addColorStop(1, 'rgba(200, 168, 78, 0.0)');

      var gradientBlue = ctx.createLinearGradient(0, 0, 0, 260);
      gradientBlue.addColorStop(0, 'rgba(88, 166, 255, 0.15)');
      gradientBlue.addColorStop(1, 'rgba(88, 166, 255, 0.0)');

      pvChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: t('chart_pageviews'),
              data: views,
              borderColor: '#c8a84e',
              backgroundColor: gradientGold,
              fill: true,
              tension: 0.35,
              pointRadius: 2,
              pointHoverRadius: 5,
              pointBackgroundColor: '#c8a84e',
              borderWidth: 2,
            },
            {
              label: t('chart_visitors'),
              data: uniques,
              borderColor: '#58a6ff',
              backgroundColor: gradientBlue,
              fill: true,
              tension: 0.35,
              pointRadius: 2,
              pointHoverRadius: 5,
              pointBackgroundColor: '#58a6ff',
              borderWidth: 1.5,
              borderDash: [4, 3],
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { intersect: false, mode: 'index' },
          plugins: {
            legend: { display: true, position: 'top', labels: { boxWidth: 12, padding: 16, usePointStyle: true } },
            tooltip: {
              backgroundColor: '#161b22',
              borderColor: '#30363d',
              borderWidth: 1,
              titleColor: '#c8a84e',
              bodyColor: '#e6edf3',
              padding: 12,
              cornerRadius: 6,
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { maxTicksLimit: 10 } },
            y: { beginAtZero: true, grid: { color: 'rgba(48,54,61,0.3)' } }
          }
        }
      });

      renderPageTable(data.by_page);

    }).catch(function() {
      setText('#table-pages', t('failed_load'));
    });
  }

  function loadToolsChart() {
    apiFetch('/api/stats/tools').then(function(data) {
      var tools = data.all_time;

      var toolLabels = {
        marketplace: 'Marketplace',
        crafting: 'Crafting',
        flipping: 'Flipping',
        history: 'History'
      };

      var toolColors = {
        marketplace: '#c8a84e',
        crafting: '#58a6ff',
        flipping: '#4CAF50',
        history: '#bc8cff'
      };

      var labels = tools.map(function(t) { return toolLabels[t.name] || t.name; });
      var values = tools.map(function(t) { return t.count; });
      var colors = tools.map(function(t) { return toolColors[t.name] || '#8b949e'; });

      if (toolChart) toolChart.destroy();

      var ctx = $('#chart-tools').getContext('2d');

      toolChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: t('chart_total_uses'),
            data: values,
            backgroundColor: colors.map(function(c) { return c + '55'; }),
            borderColor: colors,
            borderWidth: 1.5,
            borderRadius: 4,
            barPercentage: 0.6,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: 'y',
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#161b22',
              borderColor: '#30363d',
              borderWidth: 1,
              titleColor: '#c8a84e',
              bodyColor: '#e6edf3',
              padding: 12,
              cornerRadius: 6,
            }
          },
          scales: {
            x: { beginAtZero: true, grid: { color: 'rgba(48,54,61,0.3)' } },
            y: { grid: { display: false } }
          }
        }
      });

    }).catch(function() {
      // silent
    });
  }

  function loadEvents() {
    apiFetch('/api/stats/events').then(function(data) {
      renderEventsTable(data.all_time, data.period);
    }).catch(function() {
      setText('#table-events', t('failed_load'));
    });
  }

  // Safe table renderers using DOM APIs
  function renderPageTable(pages) {
    var container = $('#table-pages');
    container.textContent = '';

    if (!pages || pages.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = t('no_page_data');
      container.appendChild(empty);
      return;
    }

    var maxViews = Math.max.apply(null, pages.map(function(p) { return p.views; }));
    var table = document.createElement('table');
    table.className = 'data-table';

    var thead = document.createElement('thead');
    var headRow = document.createElement('tr');
    var th1 = document.createElement('th');
    th1.textContent = t('page_col');
    var th2 = document.createElement('th');
    th2.textContent = t('views_col');
    headRow.appendChild(th1);
    headRow.appendChild(th2);
    thead.appendChild(headRow);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    pages.forEach(function(p) {
      var tr = document.createElement('tr');

      var td1 = document.createElement('td');
      var barCell = document.createElement('div');
      barCell.className = 'bar-cell';
      var miniBar = document.createElement('div');
      miniBar.className = 'mini-bar';
      miniBar.style.width = Math.max(4, (p.views / maxViews) * 100) + '%';
      var nameSpan = document.createElement('span');
      nameSpan.textContent = p.page;
      barCell.appendChild(miniBar);
      barCell.appendChild(nameSpan);
      td1.appendChild(barCell);

      var td2 = document.createElement('td');
      td2.textContent = fmt(p.views);

      tr.appendChild(td1);
      tr.appendChild(td2);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);
  }

  function renderEventsTable(allTime, period) {
    var container = $('#table-events');
    container.textContent = '';

    var events = allTime && allTime.length > 0 ? allTime : period;
    if (!events || events.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = t('no_events');
      container.appendChild(empty);
      return;
    }

    var table = document.createElement('table');
    table.className = 'data-table';

    var thead = document.createElement('thead');
    var headRow = document.createElement('tr');
    [t('event_col'), t('category_col'), t('total_col')].forEach(function(text) {
      var th = document.createElement('th');
      th.textContent = text;
      headRow.appendChild(th);
    });
    thead.appendChild(headRow);
    table.appendChild(thead);

    var badgeMap = {
      tool_use: 'badge-tool',
      download: 'badge-download',
      engagement: 'badge-engagement'
    };

    var tbody = document.createElement('tbody');
    events.forEach(function(e) {
      var tr = document.createElement('tr');

      var td1 = document.createElement('td');
      td1.textContent = e.name;

      var td2 = document.createElement('td');
      var badge = document.createElement('span');
      var cat = e.category || 'other';
      badge.className = 'badge ' + (badgeMap[cat] || 'badge-other');
      badge.textContent = cat;
      td2.appendChild(badge);

      var td3 = document.createElement('td');
      td3.textContent = fmt(e.count);

      tr.appendChild(td1);
      tr.appendChild(td2);
      tr.appendChild(td3);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);
  }

  function loadAll() {
    loadOverview();
    loadPageviewsChart();
    loadToolsChart();
    loadEvents();
  }

  loadAll();
  setInterval(loadAll, 60000);

})();
</script>

</body>
</html>
